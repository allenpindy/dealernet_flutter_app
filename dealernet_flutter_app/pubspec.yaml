name: dealernet_flutter_app
description: "DealerNET Flutter/Dart Final Project C450"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core app utilities
  intl: ^0.19.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2

  # Local database
  drift: ^2.32.0
  drift_flutter: ^0.3.0

  # Syncfusion (ALL MUST MATCH)
  syncfusion_flutter_core: ^33.2.4
  syncfusion_flutter_pdfviewer: ^33.2.4
  syncfusion_flutter_signaturepad: ^33.2.4

  # iOS icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  drift_dev: ^2.32.0
  build_runner: ^2.4.8
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/contracts/ADTcontract.pdf